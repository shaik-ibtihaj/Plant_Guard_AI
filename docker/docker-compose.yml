version: "3.9"

services:
  # ─────────────────────────────────────────
  # FastAPI Backend Service
  # ─────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: plant_guard_backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/plant_guard
      # TODO: Add additional environment variables (API keys, secrets, etc.)
    volumes:
      - ../backend:/app
      - ../models:/app/models
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - plant_guard_network

  # ─────────────────────────────────────────
  # React Frontend Service
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: plant_guard_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - plant_guard_network

  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: plant_guard_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plant_guard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - plant_guard_network

  # TODO: Add Redis for caching/task queue (Phase 2)
  # TODO: Add Celery worker for async inference tasks (Phase 2)

networks:
  plant_guard_network:
    driver: bridge

volumes:
  postgres_data:
